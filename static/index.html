<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <title>Clio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f0;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
      }

      header {
        text-align: center;
        margin-bottom: 32px;
      }

      header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      header p {
        color: #666;
        margin-top: 8px;
        font-style: italic;
      }

      .chat-container {
        width: 100%;
        max-width: 720px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 24px;
      }

      .message {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .message-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #888;
      }

      .message-bubble {
        padding: 16px 20px;
        border-radius: 12px;
        line-height: 1.7;
      }

      .user-message .message-label {
        text-align: right;
      }

      .user-message .message-bubble {
        background: #1a1a1a;
        color: white;
        align-self: flex-end;
        max-width: 85%;
      }

      .clio-message .message-bubble {
        background: white;
        border: 1px solid #ddd;
        align-self: flex-start;
      }

      .clio-message .message-bubble h1,
      .clio-message .message-bubble h2,
      .clio-message .message-bubble h3 {
        margin-top: 16px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .clio-message .message-bubble h1 {
        font-size: 1.4rem;
      }
      .clio-message .message-bubble h2 {
        font-size: 1.2rem;
      }
      .clio-message .message-bubble h3 {
        font-size: 1rem;
      }

      .clio-message .message-bubble p {
        margin-bottom: 12px;
      }

      .clio-message .message-bubble ul,
      .clio-message .message-bubble ol {
        margin-left: 20px;
        margin-bottom: 12px;
      }

      .clio-message .message-bubble li {
        margin-bottom: 4px;
      }

      .clio-message .message-bubble strong {
        font-weight: 600;
      }

      .sources {
        margin-top: 8px;
        font-size: 0.8rem;
        color: #888;
      }

      .sources span {
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .sources ul {
        list-style: none;
        margin-top: 4px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .sources li {
        font-family: monospace;
        font-size: 0.78rem;
      }

      .input-container {
        width: 100%;
        max-width: 720px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .input-row {
        display: flex;
        gap: 12px;
      }

      input {
        flex: 1;
        padding: 14px 18px;
        font-size: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        background: white;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #888;
      }

      .ask-btn {
        padding: 14px 24px;
        background: #1a1a1a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }

      .ask-btn:hover {
        background: #333;
      }
      .ask-btn:disabled {
        background: #999;
        cursor: not-allowed;
      }

      .new-btn {
        align-self: center;
        padding: 8px 16px;
        background: transparent;
        color: #888;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.85rem;
        cursor: pointer;
      }

      .new-btn:hover {
        background: #eee;
      }

      .loading {
        text-align: center;
        color: #888;
        font-size: 0.9rem;
        padding: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Clio</h1>
      <p>Your personal history research assistant</p>
    </header>

    <div class="chat-container" id="chat"></div>

    <div class="loading" id="loading">Thinking...</div>

    <div class="input-container">
      <div class="input-row">
        <input
          type="text"
          id="question"
          placeholder="Ask a history question..."
          onkeydown="if (event.key === 'Enter') ask();"
        />
        <button class="ask-btn" onclick="ask()" id="askBtn">Ask</button>
      </div>
      <button class="new-btn" onclick="newConversation()">
        New Conversation
      </button>
    </div>

    <script>
      let conversationHistory = [];

      function appendMessage(role, content, sources = []) {
        const chat = document.getElementById("chat");

        const message = document.createElement("div");
        message.className = `message ${role === "user" ? "user-message" : "clio-message"}`;

        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = role === "user" ? "You" : "Clio";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";

        if (role === "user") {
          bubble.textContent = content;
        } else {
          bubble.innerHTML = marked.parse(content);
        }

        message.appendChild(label);
        message.appendChild(bubble);

        if (sources.length > 0) {
          const sourcesDiv = document.createElement("div");
          sourcesDiv.className = "sources";
          sourcesDiv.innerHTML = `<span>Sources</span><ul>${sources.map((s) => `<li>${s.split("/").pop()}</li>`).join("")}</ul>`;
          message.appendChild(sourcesDiv);
        }

        chat.appendChild(message);
        chat.scrollIntoView({ behavior: "smooth", block: "end" });
      }

      async function ask() {
        const question = document.getElementById("question").value.trim();
        if (!question) return;

        // show user message immediately
        appendMessage("user", question);
        document.getElementById("question").value = "";

        document.getElementById("loading").style.display = "block";
        document.getElementById("askBtn").disabled = true;

        // create an empty Clio message bubble to stream into
        const chat = document.getElementById("chat");
        const message = document.createElement("div");
        message.className = "message clio-message";
        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = "Clio";
        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.innerHTML = "";
        message.appendChild(label);
        message.appendChild(bubble);
        chat.appendChild(message);

        let fullAnswer = "";

        try {
          const res = await fetch("/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, history: conversationHistory }),
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");

            for (const line of lines) {
              if (line.startsWith("data: ")) {
                const data = JSON.parse(line.slice(6));

                if (data.type === "token") {
                  // append token to full answer and re-render markdown
                  fullAnswer += data.text;
                  bubble.innerHTML = marked.parse(fullAnswer);
                  chat.scrollIntoView({ behavior: "smooth", block: "end" });
                } else if (data.type === "done") {
                  // update conversation history
                  conversationHistory = data.history;

                  // add sources below the bubble
                  const sourcesDiv = document.createElement("div");
                  sourcesDiv.className = "sources";
                  sourcesDiv.innerHTML = `<span>Sources</span><ul>${data.sources.map((s) => `<li>${s.split("/").pop()}</li>`).join("")}</ul>`;
                  message.appendChild(sourcesDiv);
                }
              }
            }
          }
        } catch (err) {
          bubble.textContent = "Error: " + err.message;
        } finally {
          document.getElementById("loading").style.display = "none";
          document.getElementById("askBtn").disabled = false;
        }
      }

      function newConversation() {
        conversationHistory = [];
        document.getElementById("question").value = "";
        document.getElementById("chat").innerHTML = "";
      }
    </script>
  </body>
</html>
