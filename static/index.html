<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <title>Clio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f0;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
      }

      header {
        text-align: center;
        margin-bottom: 40px;
      }

      header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      header p {
        color: #666;
        margin-top: 8px;
        font-style: italic;
      }

      .search-container {
        width: 100%;
        max-width: 720px;
        display: flex;
        gap: 12px;
      }

      input {
        flex: 1;
        padding: 14px 18px;
        font-size: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        background: white;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #888;
      }

      button {
        padding: 14px 24px;
        background: #1a1a1a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }

      button:hover {
        background: #333;
      }

      button:disabled {
        background: #999;
        cursor: not-allowed;
      }

      .response-container {
        width: 100%;
        max-width: 720px;
        margin-top: 32px;
        display: none;
      }

      .answer-box {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 24px;
        line-height: 1.7;
      }

      .sources-box {
        margin-top: 16px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 16px 24px;
      }

      .sources-box h3 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #888;
        margin-bottom: 10px;
      }

      .sources-box ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .sources-box li {
        font-size: 0.85rem;
        color: #555;
        font-family: monospace;
      }

      .loading {
        text-align: center;
        color: #888;
        margin-top: 32px;
        display: none;
      }

      .answer-box h1,
      .answer-box h2,
      .answer-box h3 {
        margin-top: 16px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .answer-box h1 {
        font-size: 1.4rem;
      }
      .answer-box h2 {
        font-size: 1.2rem;
      }
      .answer-box h3 {
        font-size: 1rem;
      }

      .answer-box p {
        margin-bottom: 12px;
      }

      .answer-box ul,
      .answer-box ol {
        margin-left: 20px;
        margin-bottom: 12px;
      }

      .answer-box li {
        margin-bottom: 4px;
      }

      .answer-box strong {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Clio</h1>
      <p>Your personal history research assistant</p>
    </header>

    <div class="search-container">
      <input
        type="text"
        id="question"
        placeholder="Ask a history question..."
        onkeydown="if (event.key === 'Enter') ask();"
      />
      <button onclick="ask()" id="askBtn">Ask</button>
    </div>

    <button
      onclick="newConversation()"
      id="newBtn"
      style="
        margin-top: 12px;
        padding: 8px 16px;
        background: transparent;
        color: #888;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.85rem;
        cursor: pointer;
      "
    >
      New Conversation
    </button>

    <div class="loading" id="loading">Thinking...</div>

    <div class="response-container" id="response">
      <div class="answer-box" id="answer"></div>
      <div class="sources-box">
        <h3>Sources</h3>
        <ul id="sources"></ul>
      </div>
    </div>

    <script>
      let conversationHistory = [];

      async function ask() {
        const question = document.getElementById("question").value.trim();
        if (!question) return;

        // show loading, hide previous response
        document.getElementById("loading").style.display = "block";
        document.getElementById("response").style.display = "none";
        document.getElementById("askBtn").disabled = true;

        try {
          const res = await fetch("/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, history: conversationHistory }),
          });

          const data = await res.json();

          conversationHistory = data.history;

          // display answer
          document.getElementById("answer").innerHTML = marked.parse(
            data.answer,
          );

          // display sources
          const sourcesList = document.getElementById("sources");
          sourcesList.innerHTML = "";
          data.sources.forEach((source) => {
            const li = document.createElement("li");
            // clean up the file path to just show the filename
            li.textContent = source.split("/").pop();
            sourcesList.appendChild(li);
          });

          document.getElementById("response").style.display = "block";
        } catch (err) {
          document.getElementById("answer").textContent =
            "Error: " + err.message;
          document.getElementById("response").style.display = "block";
        } finally {
          document.getElementById("loading").style.display = "none";
          document.getElementById("askBtn").disabled = false;
        }
      }

      function newConversation() {
        conversationHistory = [];
        document.getElementById("question").value = "";
        document.getElementById("response").style.display = "none";
        document.getElementById("loading").style.display = "none";
      }
    </script>
  </body>
</html>
